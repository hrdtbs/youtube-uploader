version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 1
    versioning-strategy: increase

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # dtolnay/rust-toolchain force-pushes floating refs (stable/beta/nightly),
    # so SHA pins become unreachable and Dependabot crashes with
    # "error: no such commit". Track toolchain updates manually instead.
    ignore:
      - dependency-name: dtolnay/rust-toolchain
