name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 #v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 #v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 #stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 #v2.9.1
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          node scripts/sync-app-version.mjs "$VERSION"

      - name: Prepare release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = "${{ steps.version.outputs.version }}"
          $notesPath = "release-notes.md"

          $notes = node scripts/extract-changelog.mjs $version 2>$null
          if ($LASTEXITCODE -ne 0) {
            $notes = gh api "repos/${{ github.repository }}/releases/generate-notes" `
              -X POST `
              -f tag_name=$tag `
              -f target_commitish="${{ github.sha }}" `
              --jq .body
          }

          $notes | Out-File -FilePath $notesPath -Encoding utf8
          "path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = "${{ steps.version.outputs.version }}"
          $title = "YouTube Uploader v$version"
          $notesPath = "${{ steps.notes.outputs.path }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --title $title `
              --notes-file $notesPath `
              --target "${{ github.sha }}"
          } else {
            gh release edit $tag `
              --title $title `
              --notes-file $notesPath `
              --draft=false
          }

          $id = (gh release view $tag --json id | ConvertFrom-Json).id
          "id=$id" >> $env:GITHUB_OUTPUT

      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f #v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          releaseId: ${{ steps.release.outputs.id }}
          tagName: ${{ github.ref_name }}
          updaterJsonPreferNsis: true
          releaseDraft: false
          prerelease: false
          args: '--target x86_64-pc-windows-msvc'
